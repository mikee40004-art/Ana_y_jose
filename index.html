        .lang-switch { position: fixed; top: 20px; right: 15px; z-index: 1001; background: rgba(141, 117, 74, 0.9); color: white; border: 1.5px solid white; padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; backdrop-filter: blur(5px); }
        
        .exchange-banner { background: var(--oscuro); color: white; text-align: center; padding: 6px; font-size: 0.7rem; letter-spacing: 1px; border-bottom: 2px solid var(--oro); }
        
        .hero { width: 100%; height: 220px; background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://r2.erweima.ai/i/1000108113.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }

        .btn-cat.active { background: var(--oro); color: white; }

        .content { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }

        .card-img { width: 100%; height: 180px; object-fit: cover; }

    function toggleLang() {
        currentLang = currentLang === 'es' ? 'en' : 'es';
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('txtFinalizar').innerText = t.finalizar;
        document.getElementById('lblNombre').innerText = t.nombre;
        document.getElementById('lblHab').innerText = t.hab;
        document.getElementById('lblPago').innerText = t.pago;
        document.getElementById('optCargo').innerText = t.cargo;
        document.getElementById('optTarjeta').innerText = t.tarjeta;
        document.getElementById('btnSend').innerText = t.enviar;
        
        const nav = document.getElementById('navCats');
        const activeCat = document.querySelector('.btn-cat.active')?.getAttribute('onclick').match(/'([^']+)'/)[1] || t.catsID[0];
        
        nav.innerHTML = t.cats.map((catName, i) => `
            <button class="btn-cat ${t.catsID[i] === activeCat ? 'active' : ''}" onclick="filtrar('${t.catsID[i]}', this)">${catName}</button>
        `).join('');
        
        filtrar(activeCat, document.querySelector('.btn-cat.active') || document.querySelector('.btn-cat'));
        renderCarrito();
    }

    function filtrar(cat, btn) {
        const ahora = new Date();
        const horaActual = ahora.getHours() + (ahora.getMinutes() / 60);
        
        const horarios = {
            "Desayuno": { inicio: 7.5, fin: 11.75, texto: "7:30 AM - 11:45 AM" },
            "Lunch": { inicio: 11.5, fin: 18.0, texto: "11:30 AM - 6:00 PM" },
            "Cena": { inicio: 18.01, fin: 22.5, texto: "6:01 PM - 10:30 PM" },
            "Postre": { inicio: 7.5, fin: 22.5, texto: "7:30 AM - 10:30 PM" },
            "Bebidas": { inicio: 9.0, fin: 22.5, texto: "9:00 AM - 10:30 PM" },
            "Spa": { inicio: 0.0, fin: 23.9, texto: "9:00 AM - 5:00 PM" },
            "Cena Romántica": { inicio: 0.0, fin: 23.9, texto: "24h Notice"},
        };

        const config = horarios[cat];
        const estaAbierto = horaActual >= config.inicio && horaActual <= config.fin;
        
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const grid = document.getElementById('menu-grid');
        const t = translations[currentLang];
        const sinFoto = (cat === "Postre" || cat === "Bebidas");

        let banner = `<div style="grid-column: 1/-1; text-align: center; padding: 10px; background: ${estaAbierto ? '#f1f8e9' : '#fff1f1'}; color: ${estaAbierto ? '#2e7d32' : '#c62828'}; border-radius: 8px; margin-bottom: 10px; font-size: 0.75rem; border: 1px solid">${currentLang === 'es' ? 'Horario' : 'Hours'}: ${config.texto} ${estaAbierto ? '' : ' - ' + t.cerrado}</div>`;

        grid.innerHTML = banner + platillos.filter(p => p.c === cat).map((p, i) => {
            const inputID = `note-${cat.replace(/\s+/g, '')}-${i}`;
            return `
            <div class="card ${sinFoto ? 'no-photo' : ''}" style="opacity: ${estaAbierto ? '1' : '0.5'};">
                ${sinFoto ? '' : `<img src="${p.img}" class="card-img" loading="lazy">`}
                <div class="card-body">
                    <div class="card-info">
                        <span>${currentLang === 'es' ? p.n_es : p.n_en}</span>
                        <span class="precio">$${p.p}</span>
                    </div>
                    <p class="desc">${currentLang === 'es' ? p.d_es : p.d_en}</p>
                    ${estaAbierto ? `
                        <textarea id="${inputID}" placeholder="${t.notas}"></textarea>
                        <button class="btn-add" onclick="agregar('${currentLang==='es'?p.n_es:p.n_en}', ${p.p}, '${inputID}', '${p.c}')">${t.agregar}</button>
                    ` : `<p style="color:var(--error); font-size:0.7rem; font-weight:bold; text-align:center; margin-top:10px;">${t.soloHorario}</p>`}
                </div>
            </div>`;
        }).join('');
    }

    function agregar(nombre, precio, idNota, categoria) {
        const nota = document.getElementById(idNota).value.trim();
        carrito.push({ nombre, precio, nota, categoria });
        document.getElementById(idNota).value = "";
        
        // Pequeño feedback visual
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✓";
        btn.style.background = "#2e7d32";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "";
        }, 800);

        renderCarrito();
    }

    function renderCarrito() {
        const lista = document.getElementById('cart-list');
        const resumen = document.getElementById('cart-summary');
        const t = translations[currentLang];
        
        if(carrito.length === 0) { 
            lista.innerHTML = `<p style="text-align:center; color:#999; font-style:italic; font-size:0.85rem; margin: 20px 0;">Canasta vacía / Empty cart</p>`; 
            resumen.innerHTML = ""; 
            return; 
        }
        
        lista.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0 10px 0;">
                <span style="font-weight:bold; font-size:0.9rem;">Items:</span>
                <button onclick="carrito=[];renderCarrito()" style="color:var(--error); border:none; background:none; cursor:pointer; font-size:0.75rem; font-weight:bold;">${t.vaciar}</button>
            </div>` + 
            carrito.map((item, i) => `
            <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee; animation: fadeIn 0.3s ease;">
                <span style="font-size:0.9rem;">
                    <strong>${item.nombre}</strong>
                    ${item.nota ? `<br><small style="color:var(--oro); font-style:italic;">"${item.nota}"</small>` : ''}
                </span>
                <span style="font-size:0.9rem; font-weight:bold;">$${item.p} <button onclick="carrito.splice(${i},1);renderCarrito()" style="border:none;background:none;color:#ccc;padding-left:10px; font-size:1rem;">✕</button></span>
            </div>`).join('');
            
        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const cargoServicio = carrito.reduce((acc, item) => {
            const porcentaje = (item.categoria === "Cena Romántica") ? 0.18 : 0.15;
            return acc + (item.precio * porcentaje);
        }, 0);
        
        const tot = subtotal + cargoServicio;
        
        resumen.innerHTML = `
            <div class="total-box">
                <div class="total-row"><span>${t.sub}:</span><span>$${subtotal.toFixed(2)}</span></div>
                <div class="total-row"><span>${t.serv}:</span><span>$${cargoServicio.toFixed(2)}</span></div>
                <div class="total-row total-final"><span>${t.tot}:</span><span>$${tot.toFixed(2)} MXN</span></div>
                <div style="text-align:right; font-size:0.8rem; color:#666; margin-top:5px;">Approx. $${(tot/TIPO_CAMBIO).toFixed(2)} USD</div>
            </div>`;
    }

    function irAExperiencia(tipo) {
        const t = translations[currentLang];
        const btn = Array.from(document.querySelectorAll('.btn-cat')).find(b => b.innerText.toLowerCase().includes(tipo.toLowerCase()));
        if(btn) btn.click();
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    function enviarPedido() {
        const nameInput = document.getElementById('guest-name');
        const roomInput = document.getElementById('room-num');
        const pago = document.getElementById('payment-method').value;
        
        nameInput.classList.remove('invalid');
        roomInput.classList.remove('invalid');

        if(!nameInput.value.trim() || !roomInput.value.trim() || carrito.length === 0) {
            if(!nameInput.value.trim()) nameInput.classList.add('invalid');
            if(!roomInput.value.trim()) roomInput.classList.add('invalid');
            return alert(currentLang === 'es' ? "Por favor completa tus datos y agrega platillos." : "Please complete your details and add items.");
        }

        const tieneSpa = carrito.some(item => item.categoria === "Spa");
        const tieneComida = carrito.some(item => item.categoria !== "Spa" && item.categoria !== "Cena Romántica");

        if (tieneSpa && tieneComida) {
            return alert(currentLang === 'es' ? 
                "Por favor, envíe primero su pedido de comida y luego su reserva de Spa por separado." : 
                "Please send your food order first and then your Spa reservation separately.");
        }

        const numDestino = tieneSpa ? "5219842155420" : "5219841862451";
        const emoji = tieneSpa ? "✨" : "🍽️";
        let msg = `*${emoji} ${tieneSpa ? 'SPA' : 'NUEVO PEDIDO'} - ANA Y JOSÉ*%0A%0A`;
        msg += `*Huésped:* ${nameInput.value}%0A`;
        msg += `*Habitación:* ${roomInput.value}%0A`;
        msg += `*Pago:* ${pago}%0A`;
        msg += `---%0A`;
        
        carrito.forEach((item, i) => {
            msg += `${i+1}. *${item.nombre}*%0A`;
            if(item.nota) msg += `   _Nota: ${item.nota}_%0A`;
        });

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const cargoServicio = carrito.reduce((acc, item) => {
            const porcentaje = (item.categoria === "Cena Romántica") ? 0.18 : 0.15;
            return acc + (item.precio * porcentaje);
        }, 0);
        
        msg += `---%0A*TOTAL ESTIMADO: $${(subtotal + cargoServicio).toFixed(2)} MXN*`;

        window.open(`https://wa.me/${numDestino}?text=${msg}`, '_blank');
    }

    updateUI();
</script>
