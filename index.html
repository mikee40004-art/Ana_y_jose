<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana y José Tulum - Cinematic Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --oro: #8d754a; --oscuro: #2c3e50; --beige: #f9f7f2; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--beige); margin: 0; padding: 10px; color: #333; padding-bottom: 100px; }
        
        /* Estenedor Principal */
        .container { max-width: 800px; margin: auto; background: var(--blanco); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); position: relative; }
        
        /* Banner y Hero */
        .exchange-banner { background: var(--oscuro); color: white; text-align: center; padding: 8px; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; border-bottom: 2px solid var(--oro); }
        .hero { width: 100%; height: 250px; background-image: url('https://r2.erweima.ai/i/1000108113.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .logo-overlay { background: rgba(255,255,255,0.85); padding: 20px 40px; border-radius: 10px; text-align: center; border: 1px solid var(--oro); }
        .logo-overlay h1 { margin: 0; color: var(--oro); letter-spacing: 4px; font-size: 1.6rem; text-transform: uppercase; font-family: 'Times New Roman', serif; }

        /* Navegación Categorías */
        .nav-menu { display: flex; overflow-x: auto; gap: 10px; padding: 15px; position: sticky; top: 0; background: white; z-index: 100; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .btn-cat { border: 1.5px solid var(--oro); background: white; color: var(--oro); padding: 8px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; white-space: nowrap; font-size: 0.85rem; }
        .btn-cat.active { background: var(--oro); color: white; }

        /* Tarjetas de Platillos */
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
        @media(min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: #fff; position: relative; transition: 0.3s; }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-info { display: flex; justify-content: space-between; font-weight: bold; color: var(--oscuro); }
        .precio { color: var(--oro); }
        .desc { font-size: 0.8rem; color: #666; font-style: italic; margin: 8px 0; line-height: 1.3; }

        /* Botón Play Cine */
        .btn-cine-play { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); color: var(--oro); border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; font-size: 1.2rem; transition: 0.3s; }
        .btn-cine-play:hover { transform: scale(1.1); background: var(--oro); color: white; }

        /* Modal de Video */
        .video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .video-window { width: 90%; max-width: 400px; position: relative; border: 2px solid var(--oro); border-radius: 20px; overflow: hidden; background: #000; }
        .video-window video { width: 100%; display: block; }
        .btn-close-cine { position: absolute; top: 15px; right: 15px; background: var(--oro); color: white; border: 2px solid white; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; cursor: pointer; z-index: 5001; }

        /* Formulario y Carrito */
        .canasta { background: #fdfcf9; border-top: 4px solid var(--oro); padding: 25px; }
        .form-input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-whatsapp { background: #25D366; color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* Botones Flotantes */
        .lang-switch { position: fixed; top: 60px; right: 15px; z-index: 1001; background: var(--oro); color: white; border: 2px solid white; padding: 8px 12px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .vip-experience-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 2000; width: 90%; max-width: 400px; }
        .btn-vip { flex: 1; background: var(--oscuro); color: white; border: 1.5px solid var(--oro); padding: 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        textarea { width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 5px 0; font-size: 0.75rem; margin-bottom: 10px; resize: none; font-style: italic; }
        .btn-add { background: var(--oscuro); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<button class="lang-switch" onclick="toggleLang()" id="langBtn">EN</button>

<div id="videoModal" class="video-overlay" onclick="cerrarCine()">
    <button class="btn-close-cine">✕</button>
    <div class="video-window" onclick="event.stopPropagation()">
        <video id="mainVideo" playsinline loop muted>
            <source src="" type="video/mp4">
        </video>
    </div>
</div>

<div class="container">
    <div class="exchange-banner">Exchange Rate: 1 USD = 18.50 MXN</div>
    <div class="hero">
        <div class="logo-overlay">
            <h1>ANA Y JOSÉ</h1>
            <small>The good life</small>
        </div>
    </div>
    
    <div class="nav-menu" id="navCats"></div>
    <div id="menu-grid" class="grid"></div>

    <div class="canasta">
        <h3 id="txtFinalizar" style="text-align: center; color: var(--oro);">Finalizar Pedido</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="guest-name" class="form-input" placeholder="Nombre / Name">
            <input type="text" id="room-num" class="form-input" placeholder="Hab / Room">
        </div>
        <select id="payment-method" class="form-input">
            <option value="Cargo a la Habitación">Cargo a la Habitación / Room Charge</option>
            <option value="Tarjeta">Tarjeta / Credit Card</option>
            <option value="Efectivo">Efectivo / Cash</option>
        </select>
        
        <div id="cart-list" style="margin-top: 20px;"></div>
        <div id="cart-summary"></div>
        
        <button class="btn-whatsapp" onclick="enviarPedido()" id="btnSend">Enviar Pedido vía WhatsApp</button>
    </div>
</div>

<div class="vip-experience-bar">
    <button class="btn-vip" onclick="irAExperiencia('Spa')">✨ Spa Wellness</button>
    <button class="btn-vip" onclick="irAExperiencia('Cena')">🕯️ Cena Romántica</button>
</div>

<script>
    let currentLang = 'es';
    let carrito = [];
    const TIPO_CAMBIO = 18.50;

    const translations = {
        es: {
            agregar: "Agregar al Pedido", notas: "Notas adicionales...",
            cats: ["Desayuno", "Lunch", "Cena", "Spa", "Cenas"],
            catsID: ["Desayuno", "Lunch", "Cena", "Spa", "Cenas"],
            cerrado: "CERRADO", soloHorario: "Disponible solo en su horario"
        },
        en: {
            agregar: "Add to Order", notas: "Special requests...",
            cats: ["Breakfast", "Lunch", "Dinner", "Spa", "Dinners"],
            catsID: ["Desayuno", "Lunch", "Cena", "Spa", "Cenas"],
            cerrado: "CLOSED", soloHorario: "Available only during hours"
        }
    };

    const platillos = [
        { 
            n_es: "Chilaquiles Tradicionales", n_en: "Traditional Chilaquiles", p: 250, c: "Desayuno", 
            d_es: "Con salsa verde o roja, crema y queso.", d_en: "Green or red sauce, cream and cheese.",
            img: "https://i.postimg.cc/wBhR2RDv/IMG-20260430-192623.jpg",
            vid: "https://assets.mixkit.co/videos/preview/mixkit-chef-preparing-a-dish-in-a-restaurant-kitchen-41009-large.mp4"
        },
        { 
            n_es: "Hamburguesa Signature", n_en: "Signature Burger", p: 545, c: "Lunch", 
            d_es: "Carne Angus y queso fundido.", d_en: "Angus beef and melted cheese.",
            img: "https://i.postimg.cc/vHs59RTT/SAVE-20260501-175829.jpg",
            vid: "https://assets.mixkit.co/videos/preview/mixkit-putting-the-top-on-a-delicious-burger-in-a-restaurant-41005-large.mp4"
        },
        { 
            n_es: "Pizza Margarita", n_en: "Margherita Pizza", p: 305, c: "Cena", 
            d_es: "Tomate fresco y albahaca.", d_en: "Fresh tomato and basil.",
            img: "https://i.postimg.cc/SxZ9wJr6/IMG-20260501-175052.jpg"
        },
        { 
            n_es: "Masaje Relajante", n_en: "Relaxing Massage", p: 2100, c: "Spa", 
            d_es: "60 min de paz.", d_en: "60 min of peace.",
            img: "https://r2.erweima.ai/i/1000108113.jpg"
        }
    ];

    function toggleLang() {
        currentLang = currentLang === 'es' ? 'en' : 'es';
        document.getElementById('langBtn').innerText = currentLang === 'es' ? 'EN' : 'ES';
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        const nav = document.getElementById('navCats');
        nav.innerHTML = t.cats.map((catName, i) => `
            <button class="btn-cat ${i===0?'active':''}" onclick="filtrar('${t.catsID[i]}', this)">${catName}</button>
        `).join('');
        filtrar(t.catsID[0], document.querySelector('.btn-cat'));
    }

    function filtrar(cat, btn) {
        const ahora = new Date();
        const horaActual = ahora.getHours() + (ahora.getMinutes() / 60);
        const horarios = {
            "Desayuno": { inicio: 7.5, fin: 11.75, texto: "7:30 AM - 11:45 AM" },
            "Lunch": { inicio: 11.5, fin: 23.0, texto: "11:30 AM - 1100 PM" },
            "Cena": { inicio: 18.01, fin: 23.5, texto: "6:01 PM - 11:30 PM" },
            "Spa": { inicio: 8.0, fin: 21.0, texto: "8:00 AM - 9:00 PM" },
            "Cenas": { inicio: 0.0, fin: 23.9, texto: "Reservas 24h" }
        };

        const config = horarios[cat];
        const estaAbierto = horaActual >= config.inicio && horaActual <= config.fin;
        
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const grid = document.getElementById('menu-grid');
        const t = translations[currentLang];
        
        let banner = `<div style="grid-column: 1/-1; text-align: center; padding: 8px; background: ${estaAbierto ? '#f1f8e9' : '#fff1f1'}; color: ${estaAbierto ? '#2e7d32' : '#c62828'}; border-radius: 8px; font-size: 0.7rem; border: 1px solid">Horario: ${config.texto} ${estaAbierto ? '' : ' - ' + t.cerrado}</div>`;

        grid.innerHTML = banner + platillos.filter(p => p.c === cat).map((p, i) => {
            const inputID = `note-${cat}-${i}`;
            return `
            <div class="card" style="opacity: ${estaAbierto ? '1' : '0.4'};">
                ${p.vid ? `<button class="btn-cine-play" onclick="verCine('${p.vid}')"><i class="fa-solid fa-play"></i></button>` : ''}
                <img src="${p.img}" class="card-img">
                <div class="card-body">
                    <div class="card-info"><span>${currentLang === 'es' ? p.n_es : p.n_en}</span><span class="precio">$${p.p}</span></div>
                    <p class="desc">${currentLang === 'es' ? p.d_es : p.d_en}</p>
                    ${estaAbierto ? `
                        <textarea id="${inputID}" placeholder="${t.notas}"></textarea>
                        <button class="btn-add" onclick="agregar('${currentLang==='es'?p.n_es:p.n_en}', ${p.p}, '${inputID}')">${t.agregar}</button>
                    ` : `<p style="color:red; font-size:0.7rem; font-weight:bold; text-align:center;">${t.soloHorario}</p>`}
                </div>
            </div>`;
        }).join('');
    }

    function verCine(url) {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('mainVideo');
        video.src = url;
        modal.style.display = 'flex';
        video.play();
    }

    function cerrarCine() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('mainVideo');
        video.pause();
        modal.style.display = 'none';
    }

    function agregar(nombre, precio, idNota) {
        const nota = document.getElementById(idNota).value;
        carrito.push({ nombre, precio, nota });
        renderCarrito();
        document.getElementById(idNota).value = "";
    }

    function renderCarrito() {
        const lista = document.getElementById('cart-list');
        const resumen = document.getElementById('cart-summary');
        if(carrito.length === 0) { lista.innerHTML = ""; resumen.innerHTML = ""; return; }
        
        lista.innerHTML = carrito.map((item, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; font-size:0.85rem;">
                <span><strong>${item.nombre}</strong><br><small>${item.nota}</small></span>
                <span>$${item.precio} <button onclick="carrito.splice(${i},1);renderCarrito()" style="color:red; border:none; background:none;">✕</button></span>
            </div>`).join('');
            
        const sub = carrito.reduce((acc, item) => acc + item.precio, 0);
        const tot = (sub * 1.15).toFixed(2);
        resumen.innerHTML = `
            <div style="margin-top:15px; border-top:2px solid var(--oro); padding-top:10px;">
                <div style="display:flex; justify-content:space-between;"><strong>TOTAL (Inc. 15% serv):</strong> <strong>$${tot} MXN</strong></div>
                <div style="text-align:right; font-size:0.7rem;">Aprox. $${(tot/TIPO_CAMBIO).toFixed(2)} USD</div>
            </div>`;
    }

    function enviarPedido() {
        const nombre = document.getElementById('guest-name').value;
        const hab = document.getElementById('room-num').value;
        if(!nombre || !hab || carrito.length === 0) { alert("Datos incompletos"); return; }
        let msg = `*PEDIDO ANA Y JOSÉ*%0A*Nombre:* ${nombre}%0A*Hab:* ${hab}%0A---%0A`;
        carrito.forEach(i => msg += `- ${i.nombre} (${i.nota})%0A`);
        const total = (carrito.reduce((acc, item) => acc + item.precio, 0) * 1.15).toFixed(2);
        msg += `---%0A*TOTAL:* $${total} MXN`;
        window.open(`https://wa.me/5219841862451?text=${msg}`, '_blank');
    }

    function irAExperiencia(tipo) {
        const btns = document.querySelectorAll('.btn-cat');
        btns.forEach(b => { if(b.innerText.includes(tipo)) b.click(); });
        window.scrollTo({ top: 300, behavior: 'smooth' });
    }

    updateUI();
</script>
</body>
</html>
