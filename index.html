<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana y José Tulum - Signature Menu</title>
    <style>
        :root { --oro: #8d754a; --oscuro: #2c3e50; --beige: #f9f7f2; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--beige); margin: 0; padding: 0; color: #333; padding-bottom: 120px; }
        
        .container { max-width: 800px; margin: auto; background: var(--blanco); min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        
        /* Botones VIP Flotantes */
        .vip-experience-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 2000; width: 95%; max-width: 450px; }
        .btn-vip { flex: 1; background: var(--oscuro); color: white; border: 1px solid var(--oro); padding: 14px 5px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; gap: 5px; }

        .lang-switch { position: absolute; top: 15px; right: 15px; z-index: 1001; background: rgba(255,255,255,0.9); color: var(--oscuro); border: 1px solid var(--oro); padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .exchange-banner { background: var(--oscuro); color: white; text-align: center; padding: 6px; font-size: 0.7rem; letter-spacing: 1px; border-bottom: 2px solid var(--oro); }
        
        .hero { width: 100%; height: 200px; background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://r2.erweima.ai/i/1000108113.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .logo-overlay { background: rgba(255,255,255,0.9); padding: 15px 30px; border-radius: 2px; text-align: center; border: 1px solid var(--oro); }
        .logo-overlay h1 { margin: 0; color: var(--oro); letter-spacing: 4px; font-size: 1.4rem; text-transform: uppercase; font-family: serif; }

        .nav-menu { display: flex; overflow-x: auto; gap: 10px; padding: 15px; position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #eee; -webkit-overflow-scrolling: touch; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .btn-cat { border: 1px solid #ddd; background: white; color: #777; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.3s; font-size: 0.8rem; }
        .btn-cat.active { background: var(--oro); color: white; border-color: var(--oro); }

        .content { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .card { border: 1px solid #f0f0f0; border-radius: 12px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #f9f9f9; }
        
        /* Ajuste para tarjetas sin foto */
        .card.no-photo { border-left: 4px solid var(--oro); }
        .card.no-photo .card-img { display: none; }

        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-info { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; color: var(--oscuro); font-size: 1rem; }
        .precio { color: var(--oro); margin-left: 10px; }
        .desc { font-size: 0.85rem; color: #666; font-style: italic; margin-bottom: 12px; flex-grow: 1; }
        
        textarea { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 8px; font-size: 0.8rem; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; background: #fcfcfc; resize: none; }
        .btn-add { background: var(--oscuro); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        .canasta { background: #fdfcf9; border-top: 4px solid var(--oro); padding: 20px; margin-top: 20px; }
        .form-input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .total-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--oro); margin: 15px 0; }
        .total-final { font-size: 1.3rem; font-weight: bold; color: var(--oscuro); border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-between; }
        
        .btn-whatsapp { background: #25D366; color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .credits { text-align: center; padding: 40px 10px; background: #f4f1ea; }
    </style>
</head>
<body>

<div class="container">
    <div class="exchange-banner">Exchange Rate: 1 USD = 18.50 MXN</div>
    <div class="hero">
        <button class="lang-switch" onclick="toggleLang()" id="langBtn">🇺🇸 EN / 🇲🇽 ES</button>
        <div class="logo-overlay">
            <h1>ANA Y JOSÉ</h1>
            <small style="display: block; letter-spacing: 2px; color: #666; font-style: italic;">The good life</small>
        </div>
    </div>

    <div class="nav-menu" id="navCats"></div>
    
    <div class="content">
        <div id="menu-grid" class="grid"></div>
    </div>

    <div class="canasta">
        <h3 id="txtFinalizar" style="text-align: center; margin-top: 0;">Finalizar Pedido</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
            <div><label id="lblNombre" style="font-size: 0.75rem; font-weight:bold;">Nombre:</label><input type="text" id="guest-name" class="form-input"></div>
            <div><label id="lblHab" style="font-size: 0.75rem; font-weight:bold;">Habitación:</label><input type="text" id="room-num" class="form-input" placeholder="Ej. 110A"></div>
        </div>
        <div style="margin-bottom: 20px;">
            <label id="lblPago" style="font-size: 0.75rem; font-weight:bold;">Forma de Pago:</label>
            <select id="payment-method" class="form-input">
                <option value="Cargo a la Habitación" id="optCargo">Cargo a la Habitación</option>
                <option value="Tarjeta (Terminal)" id="optTarjeta">Tarjeta Crédito-Débito</option>
                <option value="Efectivo MXN">Efectivo (MXN)</option>
                <option value="Efectivo USD">Efectivo (USD)</option>
            </select>
        </div>
        <div id="cart-list"></div>
        <div id="cart-summary"></div>
        <button class="btn-whatsapp" onclick="enviarPedido()" id="btnSend">
            <span id="btnText">Enviar Pedido vía WhatsApp</span>
        </button>
    </div>

    <div class="credits">
        <p style="margin:0; font-size: 0.7rem; color: #888;">Software de uso exclusivo</p>
        <p style="color: var(--oro); font-weight: bold; font-size: 1rem; margin-top: 5px;">Hotel Boutique Ana y José Tulum</p>
        <p style="font-size: 0.6rem; color: #bbb; margin-top: 5px;">Signature Software © 2026</p>
    </div>
</div>

<div class="vip-experience-bar">
    <button class="btn-vip" onclick="irAExperiencia('Spa')">✨ Spa & Wellness</button>
    <button class="btn-vip" onclick="irAExperiencia('Cena Romántica')">🕯️ Cena Romántica</button>
</div>

<script>
    const TIPO_CAMBIO = 18.50;
    let currentLang = 'es';
    let carrito = [];

    const translations = {
        es: {
            finalizar: "Finalizar Pedido", nombre: "Nombre:", hab: "Habitación:", pago: "Forma de Pago:",
            cargo: "Cargo a la Habitación", tarjeta: "Tarjeta Crédito-Débito", enviar: "Enviar vía WhatsApp",
            sub: "Subtotal", serv: "Servicio incluido", tot: "Total", vaciar: "🗑 Vaciar", agregar: "Agregar",
            notas: "Notas: ...", cats: ["Desayuno", "Lunch", "Cena", "Postre", "Bebidas", "Spa", "Cena Romántica"],
            catsID: ["Desayuno", "Lunch", "Cena", "Postre", "Bebidas", "Spa", "Cena Romántica"],
            cerrado: "CERRADO", soloHorario: "Disponible en su horario",
            errDatos: "⚠️ Por favor ingresa nombre y habitación", errCarrito: "⚠️ Tu canasta está vacía"
        },
        en: {
            finalizar: "Complete Order", nombre: "Name:", hab: "Room Number:", pago: "Payment Method:",
            cargo: "Room Charge", tarjeta: "Credit/Debit Card", enviar: "Send via WhatsApp",
            sub: "Subtotal", serv: "Service charge included", tot: "Total", vaciar: "🗑 Empty", agregar: "Add to Order",
            notas: "Notes:  ...", cats: ["Breakfast", "Lunch", "Dinner", "Dessert", "Drinks", "Spa", "Romantic Dinner"], 
            catsID: ["Desayuno", "Lunch", "Cena", "Postre", "Bebidas", "Spa", "Cena Romántica"],
            cerrado: "CLOSED", soloHorario: "Available only during hours",
            errDatos: "⚠️ Please enter name and room number", errCarrito: "⚠️ Your cart is empty"
        }
    };

    const platillos = [
        { n_es: "Fruta tropical Ana y José", n_en: "Ana & José tropical fruit", p: 285, d_es: "Piña, papaya, melón, frutos rojos y granola casera.", d_en: "Fruit and homemade granola.", c: "Desayuno", img: "https://i.postimg.cc/JhwBj5H7/IMG-20260430-192553.jpg" },
        { n_es: "Yogurth griego con frutos rojos", n_en: "Greek yogurth with red berries", p: 295, d_es: "Acompañado de miel agave y nibs de cacao.", d_en: "With agave honey and cacao nibs.", c: "Desayuno", img: "https://i.postimg.cc/Qd67RHbk/IMG-20260501-143852.jpg" },
        { n_es: "Avocado toast Tulum", n_en: "Avocado toast Tulum", p: 350, d_es: "Pan de masa madre, jitomate heirlom, limón curtido y brotes.", d_en: "Sourdough bread, heirlom tomatoe, pickled lemon and sprouts.", c: "Desayuno", img: "https://i.postimg.cc/zGDWtnnJ/IMG-20260501-175132.jpg" },
        { n_es: "Chilaquiles verdes o rojos", n_en: "Green or red chilaquiles", p: 250, d_es: "Crema, aguacate, frijoles negros y brotes.", d_en: "Cream, avocado, black beans and sprouts.", c: "Desayuno", img: "https://i.postimg.cc/wBhR2RDv/IMG-20260430-192623.jpg" },
        { n_es: "Huevos doña Ana", n_en: "Doña Ana eggs", p: 295, d_es: "Sobre sope de maíz azul, frijol colado y salsa de recado negro.", d_en: "Served over a blue corn sope, refried beans and recado negro sauce.", c: "Desayuno", img: "https://i.postimg.cc/htx8dNwQ/IMG-20260216-112705.jpg" },
        { n_es: "Hamburguesa Artesanal Ana y José", n_en: "Ana & José artisanal burger", p: 545, d_es: "Carne angus, queso gouda, tocino y alioli de chile xcatic.", d_en: "Angus beef, gouda cheese, bacon and xcatic chili alioli.", c: "Lunch", img: "https://i.postimg.cc/vHs59RTT/SAVE-20260501-175829.jpg" },
        { n_es: "Arrachera a la parrilla", n_en: "Grilled arrachera", p: 495, d_es: "Servida con cebolla asada, frijoles colados y tortilla recién hecha.", d_en: "Served with roasted onions, strained beans and freshly made tortillas.", c: "Cena", img: "https://i.postimg.cc/3wm2V0Xq/Screenshot-2026-05-02-17-56-31-293-com-google-android-googlequicksearchbox-edit.jpg" },
        { n_es: "Textura de chocolate criollo Maya", n_en: "Mayan criollo chocolate textures", p: 250, d_es: "Bizcocho tibio de cacao y helado de chocolate con sal de mar.", d_en: "Warm cake with local cocoa and chocolate ice cream.", c: "Postre" },
        { n_es: "Margarita Clásica", n_en: "Classic Margarita", p: 355, d_es: "Tequila Herradura, controy y jugo de limón.", d_en: "Herradura Tequila, controy and lime juice.", c: "Bebidas" },
        { n_es: "Masaje Relajante Ana y José", n_en: "Ana & José Relaxing Massage", p: 2100, d_es: "60 min de relajación profunda con aceites orgánicos.", d_en: "60 min of deep relaxation.", c: "Spa", img: "https://i.postimg.cc/XNDx4vr8/magic-edit-TUFISV9WRFFCMj-Qj-MSM4ODdh-Njg1Yz-U4Mm-I3OGI1ZWY4YWJi-NTI0Yz-Zl-Yz-Fk-My-M0-20260507-0847.jpg" },
        { n_es: "Cena Romántica frente al Mar", n_en: "Romantic Oceanside Dinner", p: 4800, d_es: "Montaje privado bajo las estrellas, menú de 4 tiempos.", d_en: "Private setup, 4-course menu.", c: "Cena Romántica", img: "https://i.postimg.cc/c15T0JvY/Una-pareja-compartiendo-una-cena-romantica-bajo-las-estrellas-con-antorcha-20260507-084013-0000.jpg" }
    ];

    function toggleLang() {
        currentLang = currentLang === 'es' ? 'en' : 'es';
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('txtFinalizar').innerText = t.finalizar;
        document.getElementById('lblNombre').innerText = t.nombre;
        document.getElementById('lblHab').innerText = t.hab;
        document.getElementById('lblPago').innerText = t.pago;
        document.getElementById('optCargo').innerText = t.cargo;
        document.getElementById('optTarjeta').innerText = t.tarjeta;
        document.getElementById('btnText').innerText = t.enviar;
        
        const nav = document.getElementById('navCats');
        const activeBtn = document.querySelector('.btn-cat.active');
        const activeCat = activeBtn ? activeBtn.getAttribute('data-cat') : 'Desayuno';
        
        nav.innerHTML = t.cats.map((catName, i) => `
            <button class="btn-cat ${t.catsID[i] === activeCat ? 'active' : ''}" 
                    data-cat="${t.catsID[i]}"
                    onclick="filtrar('${t.catsID[i]}', this)">${catName}</button>
        `).join('');
        
        filtrar(activeCat, document.querySelector(`[data-cat="${activeCat}"]`));
        renderCarrito();
    }

    function filtrar(cat, btn) {
        const ahora = new Date();
        const horaActual = ahora.getHours() + (ahora.getMinutes() / 60);
        const horarios = {
            "Desayuno": { inicio: 7.5, fin: 11.75, texto: "7:30 AM - 11:45 AM" },
            "Lunch": { inicio: 11.5, fin: 18.0, texto: "11:30 AM - 6:00 PM" },
            "Cena": { inicio: 18.01, fin: 22.5, texto: "6:01 PM - 10:30 PM" },
            "Postre": { inicio: 7.5, fin: 22.5, texto: "7:30 AM - 10:30 PM" },
            "Bebidas": { inicio: 9.0, fin: 22.5, texto: "9:00 AM - 10:30 PM" },
            "Spa": { inicio: 0, fin: 24, texto: "9:00 AM - 5:00 PM" },
            "Cena Romántica": { inicio: 0, fin: 24, texto: "24h Notice"},
        };

        const config = horarios[cat];
        const estaAbierto = horaActual >= config.inicio && horaActual <= config.fin;
        
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const grid = document.getElementById('menu-grid');
        const t = translations[currentLang];
        
        let banner = `<div style="grid-column: 1/-1; text-align: center; padding: 10px; background: ${estaAbierto ? '#f1f8e9' : '#fff1f1'}; color: ${estaAbierto ? '#2e7d32' : '#c62828'}; border-radius: 8px; margin-bottom: 10px; font-size: 0.75rem; border: 1px solid">${currentLang === 'es' ? 'Horario' : 'Hours'}: ${config.texto} ${estaAbierto ? '' : ' - ' + t.cerrado}</div>`;
        
        grid.innerHTML = banner + platillos.filter(p => p.c === cat).map((p, i) => {
            const hasImg = p.img && p.img.includes('http');
            const inputID = `note-${cat.replace(/\s+/g, '')}-${i}`;
            return `
            <div class="card ${!hasImg ? 'no-photo' : ''}" style="opacity: ${estaAbierto ? '1' : '0.6'};">
                ${hasImg ? `<img src="${p.img}" class="card-img" loading="lazy">` : ''}
                <div class="card-body">
                    <div class="card-info">
                        <span>${currentLang === 'es' ? p.n_es : p.n_en}</span>
                        <span class="precio">$${p.p}</span>
                    </div>
                    <p class="desc">${currentLang === 'es' ? p.d_es : p.d_en}</p>
                    ${estaAbierto ? `
                        <textarea id="${inputID}" placeholder="${t.notas}"></textarea>
                        <button class="btn-add" onclick="agregar('${currentLang==='es'?p.n_es:p.n_en}', ${p.p}, '${inputID}', '${p.c}')">${t.agregar}</button>
                    ` : `<p style="color:#c62828; font-size:0.75rem; font-weight:bold; text-align:center; margin-top:10px;">${t.soloHorario}</p>`}
                </div>
            </div>`;
        }).join('');
    }

    function agregar(nombre, precio, idNota, categoria) {
        const nota = document.getElementById(idNota).value.trim();
        carrito.push({ nombre, precio, nota, categoria });
        document.getElementById(idNota).value = "";
        renderCarrito();
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✓ OK";
        setTimeout(() => btn.innerText = originalText, 1000);
    }

    function renderCarrito() {
        const lista = document.getElementById('cart-list');
        const resumen = document.getElementById('cart-summary');
        const t = translations[currentLang];

        if(carrito.length === 0) { 
            lista.innerHTML = `<p style="text-align:center; color:#999; font-style:italic; font-size:0.85rem; margin: 20px 0;">Canasta vacía / Empty cart</p>`; 
            resumen.innerHTML = ""; 
            return; 
        }
        
        lista.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 2px solid #eee; padding-bottom:5px;"><span style="font-weight:bold;">Items:</span><button onclick="carrito=[];renderCarrito()" style="color:red; border:none; background:none; cursor:pointer; font-size:0.75rem;">${t.vaciar}</button></div>` + 
            carrito.map((item, i) => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f9f9f9; font-size:0.9rem;">
                <span style="flex:1;"><strong>${item.nombre}</strong>${item.nota ? `<br><small style="color:var(--oro);">"${item.nota}"</small>` : ''}</span>
                <span style="white-space:nowrap;">$${item.precio} <button onclick="carrito.splice(${i},1);renderCarrito()" style="border:none;background:none;color:#ccc;padding:0 5px;">✕</button></span>
            </div>`).join('');

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const cargoServicio = carrito.reduce((acc, item) => {
            const porcentaje = (item.categoria === "Cena Romántica") ? 0.18 : 0.15;
            return acc + (item.precio * porcentaje);
        }, 0);
        const tot = subtotal + cargoServicio;

        resumen.innerHTML = `
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;"><span>${t.sub}:</span><span>$${subtotal.toFixed(2)}</span></div>
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#666;"><span>${t.serv}:</span><span>$${cargoServicio.toFixed(2)}</span></div>
                <div class="total-final"><span>${t.tot}:</span><span>$${tot.toFixed(2)} MXN</span></div>
                <div style="text-align:right; font-size:0.75rem; color:#999; margin-top:5px;">Approx. $${(tot/TIPO_CAMBIO).toFixed(2)} USD</div>
            </div>`;
    }

    function enviarPedido() {
        const nom = document.getElementById('guest-name').value.trim();
        const hab = document.getElementById('room-num').value.trim();
        const pago = document.getElementById('payment-method').value;
        const t = translations[currentLang];
        const btn = document.getElementById('btnSend');

        // VALIDACIÓN MODERNA (Sin el mensaje del navegador)
        if(!nom || !hab || carrito.length === 0) {
            const originalText = btn.innerHTML;
            btn.style.background = "#c62828"; // Color rojo error
            
            if(!nom || !hab) {
                btn.innerText = currentLang === 'es' ? "⚠️ Ingresa nombre y habitación" : "⚠️ Enter name and room";
            } else if(carrito.length === 0) {
                btn.innerText = currentLang === 'es' ? "⚠️ Tu canasta está vacía" : "⚠️ Your cart is empty";
            }

            setTimeout(() => {
                btn.style.background = "#25D366"; // Regresa al verde original
                btn.innerHTML = originalText;
            }, 3000);
            return;
        }

        // LOGÍSTICA NUEVA: Separar Spa de todo lo demás (La cena romántica ahora se queda con cocina)
        const tieneSpa = carrito.some(item => item.categoria === "Spa");
        const tieneOtros = carrito.some(item => item.categoria !== "Spa"); 

        if (tieneSpa && tieneOtros) {
            btn.innerText = currentLang === 'es' ? "⚠️ Envía Spa y Alimentos por separado" : "⚠️ Send Spa and Food separately";
            btn.style.background = "#c62828";
            setTimeout(() => {
                btn.style.background = "#25D366";
                btn.innerHTML = t.enviar;
            }, 3000);
            return;
        }

        // Enrutamiento de números (Spa -> ...5420 / Alimentos, Bebidas y Cena Romántica -> ...2451)
        const num = tieneSpa ? "5219842155420" : "5219841862451";
        
        // Titulo inteligente para el mensaje de WhatsApp
        let tipoOrden = "ORDEN";
        if (tieneSpa) {
            tipoOrden = "SPA";
        } else if (carrito.some(item => item.categoria === "Cena Romántica")) {
            tipoOrden = "CENA ROMÁNTICA";
        }

        let msg = `*${tipoOrden} - ANA Y JOSÉ*%0A*Nombre:* ${nom}%0A*Hab:* ${hab}%0A*Pago:* ${pago}%0A---%0A`;
        
        carrito.forEach((item, i) => {
            msg += `${i+1}. *${item.nombre}*%0A${item.nota ? `   _Nota: ${item.nota}_%0A` : ''}`;
        });

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const serv = carrito.reduce((acc, item) => acc + (item.precio * (item.categoria === "Cena Romántica" ? 0.18 : 0.15)), 0);
        msg += `---%0A*TOTAL: $${(subtotal + serv).toFixed(2)} MXN*`;

        window.open(`https://wa.me/${num}?text=${msg}`, '_blank', 'noopener');
    }

    function irAExperiencia(tipo) {
        const btns = Array.from(document.querySelectorAll('.btn-cat'));
        const target = btns.find(b => b.innerText.includes(tipo)) || btns.find(b => b.getAttribute('data-cat') === tipo);
        if(target) target.click();
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    updateUI();
</script>
</body>
</html>
